<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- viewport-fit=cover makes env(safe-area-inset-bottom) non-zero on
         notched iPhones so the bottom nav pads above the home indicator. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Hatch Stock Management System - Inventory tracking for warehouses and vending locations" />
    <meta name="theme-color" content="#004638" />
    <!-- PWA + iOS "Add to Home Screen" support — improves the on-iPhone
         scanning experience by going full-screen and hiding the URL bar. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- iOS requires a PNG here (SVG is ignored → ugly default tile). Full-bleed
         square; iOS rounds the corners itself. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hatch Stock" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Hatch Stock Management</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
